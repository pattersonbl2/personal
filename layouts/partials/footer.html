<footer class="site-footer">
  <div class="container">
    <span class="footer-copy">© {{ now.Year }} {{ site.Params.author }}</span>
    <div class="footer-links">
      {{- range site.Params.socialIcons }}
      <a href="{{ .url }}" target="_blank" rel="noopener" aria-label="{{ .name }}">
        {{- partial "svg-icon.html" (dict "name" .name "size" "16") }}
        {{ .name }}
      </a>
      {{- end }}
    </div>
  </div>
</footer>
