<div class="go-terminal" aria-hidden="true">
  <div class="go-terminal-header">
    <div class="go-terminal-dots">
      <span class="dot-red"></span>
      <span class="dot-yellow"></span>
      <span class="dot-green"></span>
    </div>
    <span class="go-terminal-filename" id="pl-file">deploy · ark31/platform</span>
    <div class="go-terminal-dots-spacer"></div>
  </div>
  <div class="go-terminal-body" id="pl-body">
    <div class="pipeline" id="pl-out"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // Pipeline stages — `run` is the cosmetic spinner duration (ms); `time` is the
  // fake wall-clock shown after the stage resolves.
  var STAGES = [
    { stage: 'build',   run: 850, time: '12.3s', detail: 'docker image <span class="pl-hash">ghcr.io/ark31/api</span>' },
    { stage: 'test',    run: 750, time: '8.1s',  detail: '<span class="pl-pass">142 passed</span>, 0 failed' },
    { stage: 'scan',    run: 650, time: '3.4s',  detail: 'trivy — <span class="pl-pass">0 critical</span>, 0 high' },
    { stage: 'deploy',  run: 900, time: '9.7s',  detail: 'argocd sync → <span class="pl-hash">production</span>' },
    { stage: 'rollout', run: 800, time: '6.2s',  detail: '<span class="pl-pass">3/3</span> pods healthy' },
    { stage: 'verify',  run: 600, time: '1.1s',  detail: '/healthz <span class="pl-pass">200</span> · p99 42ms' },
  ];

  // A little variety per loop so it never feels canned.
  var COMMITS = [
    { hash: 'a1b9f3c', msg: 'feat: add cluster health checks' },
    { hash: '7e02d4a', msg: 'fix: tighten readiness probe timing' },
    { hash: 'c5f8b21', msg: 'chore: bump argocd to v2.13' },
    { hash: 'f30ad6e', msg: 'feat: golden-signal SLO alerts' },
    { hash: '9d41c7b', msg: 'refactor: split ingress per namespace' },
  ];

  var SPIN = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
  var HOLD = 3200;     // pause on the completed run before resetting
  var STAGE_GAP = 140; // delay between stages resolving

  var outEl, bodyEl, fileEl;
  var runIdx = 0, timers = [], spinTimer = null;

  function clearTimers() {
    timers.forEach(clearTimeout);
    timers = [];
    if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
  }
  function later(fn, ms) { var t = setTimeout(fn, ms); timers.push(t); return t; }

  function makeRow(stage) {
    var row = document.createElement('div');
    row.className = 'pl-row';
    row.innerHTML =
      '<span class="pl-icon is-pending">·</span>' +
      '<span class="pl-stage">' + stage.stage + '</span>' +
      '<span class="pl-detail"></span>' +
      '<span class="pl-time"></span>';
    return row;
  }

  function spin(iconEl) {
    var i = 0;
    iconEl.className = 'pl-icon is-running';
    iconEl.textContent = SPIN[0];
    spinTimer = setInterval(function () {
      i = (i + 1) % SPIN.length;
      iconEl.textContent = SPIN[i];
    }, 80);
  }

  function renderStatic() {
    // reduced-motion: show a finished run, no animation
    var c = COMMITS[0];
    outEl.innerHTML =
      '<div class="pipeline-cmd"><span class="pl-prompt">$</span>git push origin main</div>' +
      '<div class="pl-row is-visible"><span class="pl-icon is-ok">✓</span>' +
        '<span class="pl-stage">commit</span><span class="pl-detail">' +
        '<span class="pl-hash">' + c.hash + '</span> ' + c.msg + '</span><span class="pl-time"></span></div>';
    STAGES.forEach(function (s) {
      outEl.insertAdjacentHTML('beforeend',
        '<div class="pl-row is-visible"><span class="pl-icon is-ok">✓</span>' +
        '<span class="pl-stage">' + s.stage + '</span>' +
        '<span class="pl-detail">' + s.detail + '</span>' +
        '<span class="pl-time">' + s.time + '</span></div>');
    });
    outEl.insertAdjacentHTML('beforeend',
      '<div class="pl-summary is-visible"><span class="pl-check">✔</span>deployed to production in 1m 04s</div>');
  }

  function run() {
    clearTimers();
    outEl.innerHTML = '';
    var commit = COMMITS[runIdx % COMMITS.length];
    runIdx++;

    // command
    var cmd = document.createElement('div');
    cmd.className = 'pipeline-cmd';
    cmd.innerHTML = '<span class="pl-prompt">$</span>git push origin main';
    outEl.appendChild(cmd);

    // commit row (resolves immediately)
    var commitRow = makeRow({ stage: 'commit' });
    outEl.appendChild(commitRow);
    later(function () {
      commitRow.classList.add('is-visible');
      var ic = commitRow.querySelector('.pl-icon');
      ic.className = 'pl-icon is-ok';
      ic.textContent = '✓';
      commitRow.querySelector('.pl-detail').innerHTML =
        '<span class="pl-hash">' + commit.hash + '</span> ' + commit.msg;
    }, 350);

    // build remaining rows
    var rows = STAGES.map(function (s) { var r = makeRow(s); outEl.appendChild(r); return r; });

    var t = 650;
    STAGES.forEach(function (s, idx) {
      var row = rows[idx];
      // reveal + start spinner
      later(function () {
        row.classList.add('is-visible');
        spin(row.querySelector('.pl-icon'));
        bodyEl.scrollTop = bodyEl.scrollHeight;
      }, t);
      // resolve
      later(function () {
        if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
        var ic = row.querySelector('.pl-icon');
        ic.className = 'pl-icon is-ok';
        ic.textContent = '✓';
        row.querySelector('.pl-detail').innerHTML = s.detail;
        row.querySelector('.pl-time').textContent = s.time;
        bodyEl.scrollTop = bodyEl.scrollHeight;
      }, t + s.run);
      t += s.run + STAGE_GAP;
    });

    // summary + loop
    later(function () {
      var sum = document.createElement('div');
      sum.className = 'pl-summary';
      sum.innerHTML = '<span class="pl-check">✔</span>deployed to production in 1m 04s';
      outEl.appendChild(sum);
      later(function () { sum.classList.add('is-visible'); }, 30);
      bodyEl.scrollTop = bodyEl.scrollHeight;
    }, t);

    later(run, t + HOLD);
  }

  function init() {
    outEl  = document.getElementById('pl-out');
    bodyEl = document.getElementById('pl-body');
    fileEl = document.getElementById('pl-file');
    if (!outEl) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      renderStatic();
      return;
    }
    later(run, 600);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
