baseURL: '/'  # Overridden by build script using CF_PAGES_URL or production URL
languageCode: 'en-us'
title: 'ark31.info'

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false   # Use CSS classes so we can override colors

enableRobotsTXT: true

security:
  funcs:
    getenv:
      - '^RESUME_TOKEN$'
      - '^HUGO_'

params:
  author: 'Brandon Patterson'
  role: 'DevOps Engineer'
  company: 'Jasper AI'
  description: 'SRE at Jasper AI. Writing about infrastructure, observability, and platform engineering.'
  imageUrl: '/images/bleach-styled-image.png'
  socialIcons:
    - name: 'Github'
      url: 'https://github.com/pattersonbl2'
    - name: 'LinkedIn'
      url: 'https://www.linkedin.com/in/pattersonbl2/'

mainSections:
  - posts

menu:
  main:
    - name: Blog
      url: /posts/
      weight: 10
    - name: Resume
      url: /resume/
      weight: 20
    - name: Contact
      url: /contact/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
